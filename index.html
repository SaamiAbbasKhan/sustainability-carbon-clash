<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbon Clash</title>
  <script>
    // Intercept and silence benign sandbox WebSocket/Vite network link rejections to prevent ugly browser prompts
    window.addEventListener('unhandledrejection', function (event) {
      if (event.reason && (
        event.reason.message && event.reason.message.includes('WebSocket') ||
        String(event.reason).includes('WebSocket') ||
        String(event.reason).includes('vite') ||
        String(event.reason).includes('Websocket') ||
        String(event.reason).includes('opened')
      )) {
        event.preventDefault();
        event.stopImmediatePropagation();
      }
    }, true);

    window.addEventListener('error', function (event) {
      if (event.message && (
        event.message.includes('WebSocket') ||
        event.message.includes('vite') ||
        event.message.includes('opened') ||
        event.message.includes('hmr')
      )) {
        event.preventDefault();
        event.stopImmediatePropagation();
      }
    }, true);
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
